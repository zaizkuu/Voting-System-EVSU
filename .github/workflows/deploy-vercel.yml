name: Deploy to Vercel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    defaults:
      run:
        working-directory: evsu-voting

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate configuration
        shell: bash
        run: |
          if [[ ! -d "." ]]; then
            echo "Project directory not found: evsu-voting"
            exit 1
          fi

          if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "Missing one or more GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Deploy branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            echo "Deploying production build for ${GITHUB_REF_NAME}"
            vercel --prod --yes --token="$VERCEL_TOKEN"
          else
            echo "Deploying preview build for ${GITHUB_REF_NAME}"
            vercel --yes --token="$VERCEL_TOKEN"
          fi
